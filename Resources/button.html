<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orange Button Example</title>
    <style>
        .orange-button {
            background-color: #FFA500; /* Clean shade of orange */
            color: white; /* Text color */
            border: 2px solid #FF8C00; /* Border color */
            border-radius: 5px; /* Rounded corners */
            padding: 10px 20px; /* Button padding */
            font-size: 16px; /* Font size */
            cursor: pointer; /* Pointer cursor on hover */
            transition: transform 0.1s; /* Transition for the push effect */
        }

        .orange-button:active {
            transform: translateY(2px); /* Push in effect */
        }

        .orange-button:hover {
            background-color: #FF8C00; /* Darker shade on hover */
        }
    </style>
</head>
<body>

    <button class="orange-button">Click Me</button>

</body>
</html>
